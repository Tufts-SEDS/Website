{% extends 'base.html' %}
{% load static %}
{% block title %} Contact Us | Tufts SEDS {% endblock %}

{% block extrastylesheet %}
<link rel="stylesheet" media="all" href="{% static 'css/contact-style.min.css' %}" type="text/css">
{% endblock %}

{% block pagecontent %}
<!-- Page Content-->
<div class="apo-page">
    <!-- Content Section-->
    <div class="apo-section">
    <div class="contact-container">
        <section class="get-in-touch">
            <h1 class="title align-center">Get in touch</h1>
            <!-- Contact Form-->
            <form class="contact-form row" method="POST">
                {% csrf_token %}
                <div class="form-field col x-50">
                    <input id="name" name="name" class="input-text js-input" type="text" placeholder="Name" required>
                </div>
                <hr class="spacer">
                <div class="form-field col x-50">
                    <input id="email" name="email" class="input-text js-input" type="email" placeholder="Email" required>
                </div>
                <hr class="spacer">
                <div class="form-field col x-100">
                    <input id="message" name="message" class="input-text js-input" type="text" placeholder="Message" required>
                </div>
                <div class="form-field col x-100 align-center submitting">
                    <input hidden class="submit-btn" type="submit" value="Submit">
                    <a href="javascript:;" class="apo-btn apo-btn-small" onclick="$('.submit-btn').click();"> Submit </a>
                </div>
            </form>
            <!-- End Contact Form-->
        </section>
    </div>
    </div>
<!-- End Content Section-->
</div>
<!-- End Page Content-->
{% endblock %}


{% block extrascripts %}
<script>
    $(".spacer").css('visibility', 'hidden');
</script>
{% endblock %}
